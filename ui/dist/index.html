<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parking Layout Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      display: flex;
      height: 100vh;
    }
    #canvas-container {
      flex: 1;
      position: relative;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #params-panel {
      width: 280px;
      background: #16213e;
      padding: 16px;
      overflow-y: auto;
      border-left: 1px solid #0f3460;
    }
    #params-panel h2 {
      font-size: 14px;
      margin-bottom: 12px;
      color: #e94560;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .param-group {
      margin-bottom: 12px;
    }
    .param-group label {
      display: block;
      font-size: 12px;
      color: #a0a0b0;
      margin-bottom: 4px;
    }
    .param-group input[type="range"] {
      width: 100%;
      accent-color: #e94560;
    }
    .param-group input[type="number"] {
      width: 100%;
      background: #0f3460;
      border: 1px solid #1a1a4e;
      color: #e0e0e0;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 13px;
    }
    .param-value {
      float: right;
      font-size: 12px;
      color: #e94560;
    }
    #metrics {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #0f3460;
    }
    #metrics h2 {
      margin-bottom: 8px;
    }
    .metric-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 4px;
    }
    .metric-row .value {
      color: #e94560;
      font-weight: 600;
    }
    .layer-toggle label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .layer-toggle input[type="checkbox"] {
      accent-color: #e94560;
    }
    #toolbar {
      position: absolute;
      top: 8px;
      left: 8px;
      display: flex;
      gap: 4px;
      z-index: 10;
    }
    #toolbar button {
      background: #16213e;
      color: #a0a0b0;
      border: 1px solid #0f3460;
      border-radius: 4px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    #toolbar button:hover {
      background: #1a2a50;
      color: #e0e0e0;
    }
    #toolbar button.active {
      background: #0f3460;
      color: #e94560;
      border-color: #e94560;
    }
    #toolbar .separator {
      width: 1px;
      background: #0f3460;
      margin: 0 4px;
    }
    #mode-hint {
      position: absolute;
      bottom: 8px;
      left: 8px;
      font-size: 12px;
      color: #606080;
      z-index: 10;
    }
  </style>
  <script type="module" crossorigin src="/parking/assets/index-CasqI_9M.js"></script>
</head>
<body>
  <div id="canvas-container">
    <div id="toolbar"></div>
    <canvas id="canvas"></canvas>
    <div id="mode-hint"></div>
  </div>
  <div id="params-panel"></div>
</body>
</html>
